# ============================================================
# 应用基础配置
# ============================================================

# 应用名称，用于日志、链路追踪等标识。默认：my_app
name: my_app

# 运行环境。常用值：local / dev / staging / production。默认：local
env: local

# ============================================================
# 日志配置（clog）
# ============================================================
log:
  # 日志级别。可选：DEBUG / INFO / WARN / ERROR。默认：INFO
  level: INFO

  # 输出格式。可选：text（人类可读）/ json（结构化，适合日志采集）。默认：text
  format: text

  # 输出目标。填 stdout / stderr，或填绝对文件路径以追加写入。默认：stdout
  path: stdout

  # 为 true 时，从 context / OpenTelemetry span 向日志字段注入 trace_id、span_id。默认：true
  with_trace: true

  # 为 true 时，slog 在日志中附带源码位置（调用方文件与行号）。默认：true
  add_source: true

# ============================================================
# HTTP 服务配置（chttp / Gin）
# ============================================================
http_server:
  # 监听地址。格式：[host]:port。默认：:8080
  addr: ":8080"

  # 收到关闭信号后等待在途请求完成的最长时间。默认：30s
  shutdown_timeout: 30s

  # 读取完整请求（含 body）的超时。默认：30s
  read_timeout: 30s

  # 写入完整响应的超时。默认：30s
  write_timeout: 30s

  # Keep-Alive 连接空闲超时。默认：60s
  idle_timeout: 60s

  # 健康检查端点路径。默认：/healthz
  health_path: /healthz

  # Prometheus metrics 端点路径（需在代码中向 chttp 注入 cotel.Provider 且 exporter 可用时才会注册）。默认：/metrics
  metrics_path: /metrics

  # CORS 跨域配置。整个 cors 块不填（或注释掉）表示不启用 CORS 中间件。
  # cors:
  #   # 是否允许所有来源（会忽略 allow_origins）。生产环境不建议开启。
  #   allow_all_origins: false
  #
  #   # 允许的来源列表（allow_all_origins 为 false 时生效）
  #   allow_origins:
  #     - https://example.com
  #     - https://app.example.com
  #
  #   # 允许的 HTTP 方法
  #   allow_methods:
  #     - GET
  #     - POST
  #     - PUT
  #     - DELETE
  #
  #   # 允许的请求头
  #   allow_headers:
  #     - Authorization
  #     - Content-Type
  #
  #   # 是否允许携带 Cookie / 认证信息
  #   allow_credentials: false
  #
  #   # 预检请求（OPTIONS）结果缓存时长
  #   max_age: 12h

  # 访问日志中间件。默认开启；输出使用注入的 *slog.Logger，格式与 log 块一致。
  access_log:
    # 是否启用访问日志。默认：true
    enabled: true

    # 预留字段（当前中间件未单独切换格式）。默认：空
    format: ""

  # pprof 性能分析配置。默认开启，仅允许本地访问。
  pprof:
    # 是否启用 pprof 端点（/debug/pprof/）。默认：true
    enabled: true

    # 是否允许非本地 IP 访问 pprof。生产环境建议保持 false。默认：false
    allow_external: false

    # 访问 pprof 时需要携带的 Authorization 头。为空则不鉴权。默认：""
    # authorization_token: "Bearer my-secret-token"

# ============================================================
# OpenTelemetry（cotel）
# 整个 otel 块省略时，cotel.New 可使用零值配置；向 chttp 注入 Provider 后才会启用 otelgin、
# HTTP 指标中间件及 /metrics 上的 Prometheus handler（取决于 exporter 是否返回非 nil handler）。
# ============================================================
# otel:
#   trace:
#     # OTLP gRPC Collector 地址。为空则不通过 OTLP 导出 trace。
#     endpoint: "otel-collector:4317"
#     # 是否使用非 TLS 连接（内网/开发可开启）。默认：false
#     insecure: true
#     # 采样率 0.0~1.0。1.0=全量采样。默认：1.0
#     sample_rate: 1.0
#
#   metric:
#     # OTLP gRPC 推送地址。为空则仍可仅通过 Prometheus 拉取暴露指标（由 cotel 实现决定）。
#     endpoint: "otel-collector:4317"
#     # 是否使用非 TLS 连接。默认：false
#     insecure: true

# ============================================================
# 数据访问层（cdao）
# database / redis / oss / openai / mcache / http_client /
# rabbitmq / kafka / elasticsearch / mongo 均支持多实例，key 为自定义连接名称。
# 各 Must() 省略 name 时默认取名为 "default" 的实例。
# 使用某类资源前须在代码中 blank import 对应 cdao/provider/... 完成注册。
# 整个 dao 块不填（或注释掉）表示不在配置中声明数据源。
# ============================================================
# dao:
#   database:
#     # 默认库（gormx.Must(dao) 即取此实例）
#     default:
#       driver: mysql
#       # Go MySQL DSN：user:pass@tcp(host:port)/dbname?parseTime=true
#       dsn: "root:password@tcp(127.0.0.1:3306)/mydb?charset=utf8mb4&parseTime=true"
#       # AutoMigrate 时是否禁止在数据库层面创建外键约束。nil 视为 true（不创建外键）。
#       # disable_migrate_foreign_key: true
#     # 从库（按需添加，gormx.Must(dao, "replica") 取用）
#     replica:
#       driver: mysql
#       dsn: "root:password@tcp(127.0.0.1:3307)/mydb?charset=utf8mb4&parseTime=true"
#     # PostgreSQL 实例
#     analytics:
#       driver: postgres
#       dsn: "host=127.0.0.1 port=5432 user=postgres password=password dbname=mydb sslmode=disable"
#
#   redis:
#     # 默认实例（redisx.Must(dao) 即取此实例）
#     default:
#       addr: "127.0.0.1:6379"
#       password: ""
#       # 逻辑库编号（0-15）
#       db: 0
#       read_timeout: 3s
#       write_timeout: 3s
#     # 分布式锁等独立实例（redisx.Must(dao, "lock") 取用）
#     lock:
#       addr: "127.0.0.1:6379"
#       password: ""
#       db: 1
#       read_timeout: 3s
#       write_timeout: 3s
#
#   oss:
#     default:
#       # OSS 服务端点，如 https://oss-cn-hangzhou.aliyuncs.com
#       endpoint: "https://oss-cn-hangzhou.aliyuncs.com"
#       access_key_id: "your-access-key-id"
#       access_key_secret: "your-access-key-secret"
#     # backup:
#     #   endpoint: "https://oss-cn-beijing.aliyuncs.com"
#     #   access_key_id: "your-access-key-id"
#     #   access_key_secret: "your-access-key-secret"
#
#   openai:
#     default:
#       api_key: "sk-xxxxxxxxxxxxxxxxxxxx"
#       # 为空使用官方默认；可填代理或 OpenAI 兼容服务的 base URL。
#       # base_url: "https://api.openai.com/v1"
#     # deepseek:
#     #   api_key: "sk-xxxxxxxxxxxxxxxxxxxx"
#     #   base_url: "https://api.deepseek.com/v1"
#
#   mcache:
#     # 基于 ristretto（mcachex.Must(dao)）
#     default:
#       # 频率计数器数量，建议约为预期最大条目数的 10 倍。默认：10000000
#       num_counters: 10000000
#       # 最大占用字节数。默认：536870912（512MB）
#       max_cost: 536870912
#       # 写入缓冲区大小。默认：64
#       buffer_items: 64
#
#   http_client:
#     payment:
#       # 根地址：健康检查（HEAD）与 OTel peer.service；业务仍须自行拼 URL。
#       base_url: "https://payment.internal"
#       timeout: 10s
#       max_idle_conns: 100
#       max_conns_per_host: 20
#       idle_conn_timeout: 90s
#       # tls_skip_verify: false
#
#       retry:
#         max_attempts: 3
#         wait_min: 100ms
#         wait_max: 2s
#
#       circuit_breaker:
#         max_requests: 1
#         interval: 60s
#         timeout: 30s
#         threshold: 5
#
#   rabbitmq:
#     default:
#       # amqp://user:pass@host:5672/vhost
#       url: "amqp://guest:guest@127.0.0.1:5672/"
#     # events:
#     #   url: "amqp://user:pass@127.0.0.1:5672/events"
#
#   kafka:
#     default:
#       brokers:
#         - "127.0.0.1:9092"
#       dial_timeout: 10s
#     # analytics:
#     #   brokers:
#     #     - "kafka-analytics:9092"
#
#   elasticsearch:
#     default:
#       addresses:
#         - "http://127.0.0.1:9200"
#       username: ""
#       password: ""
#       # api_key 优先于 username/password
#       # api_key: "base64encodedkey=="
#       # Elastic Cloud
#       # cloud_id: "my-deployment:dXMtZWFzdC0x..."
#
#   mongo:
#     default:
#       uri: "mongodb://127.0.0.1:27017"
#       connect_timeout: 10s
#     # rs:
#     #   uri: "mongodb://user:pass@mongo1:27017,mongo2:27017,mongo3:27017/mydb?replicaSet=rs0&authSource=admin"
#     #   connect_timeout: 10s

# ============================================================
# 定时任务（ccron）
# 整个 cron 块省略时使用 setDefaults（时区 Asia/Shanghai 等）。
# distributed 为 true 时，手写组装需自行 ccron.WithLocker；cfx 下需同时提供 *clocker.Locker（见 cfx.ProvideCron）。
# lock_redis 供业务用 redisx.Must(dao, cfg.Cron.LockRedis) 创建 Locker 时使用。默认：default
# ============================================================
# cron:
#   timezone: "Asia/Shanghai"
#   distributed: false
#   lock_redis: default
#   lock_ttl: 5m

# ============================================================
# 分布式 ID（配合 cfx.ProvideUID*FromConfig）
# 整个 uid 块省略表示不在配置里声明；snowflake_static 与 redis_snowflake 按业务二选一（对应不同 Provide 函数）。
# ============================================================
# uid:
#   # 静态 Snowflake 节点 ID（0~1023，取决于 snowflake 库约定）
#   snowflake_static:
#     node_id: 1
#
#   # 基于 Redis 租约抢占 node 的 Snowflake（需已配置 dao.redis）
#   redis_snowflake:
#     # dao.redis 中的实例名，空等价于 "default"
#     redis: default
#     # 对应 cuid.WithRedisKeyPrefix，空则用包内默认前缀
#     key_prefix: "app:sf:"
#     # 同时大于 0 时才会传给 cuid.WithHeartbeat；否则用库默认心跳与租约
#     heartbeat_every: 5s
#     lease_ttl: 30s
#     # 节点号上界（开区间），默认 1024 即合法节点 ∈ [0, 1023]
#     max_node_exclusive: 1024

# ============================================================
# Temporal（ctemporal）
# 整个 temporal 块省略时由 ctemporal.New 结合默认值处理；具体行为见 ctemporal 包。
# ============================================================
# temporal:
#   # 本地：localhost:7233；Temporal Cloud：<namespace>.<accountId>.tmprl.cloud:7233
#   host_port: "localhost:7233"
#   namespace: "default"
#
#   # Temporal Cloud 推荐：API Key（设置后自动 TLS，一般无需再配 tls:）
#   # api_key: "your-temporal-cloud-api-key"
#
#   # mTLS 或自管 CA 等：
#   # tls:
#   #   cert_file: "/path/to/client.pem"
#   #   key_file: "/path/to/client.key"
#   #   ca_file: "/path/to/ca.pem"
#   #   server_name: ""
#   #   insecure_skip_verify: false
#
#   worker:
#     max_concurrent_activity_executors: 100
#     max_concurrent_workflow_task_executors: 100
#     max_concurrent_local_activity_executors: 100

# ============================================================
# 限流（climiter）
# 每个 key 为限流器实例名，通过 climiter.NewFromConfig(cfg.Limiter, redisGetter) 批量创建，
# 再用 registry.Must("name").Limit(ctx, key) 按名取用。
# 整个 limiter 块省略时不创建任何限流器实例。
#
# algo 可选值（省略时默认 sliding_window）：
#   sliding_window  — 分布式滑动窗口（推荐）：边界平滑，无需分布式锁，适合大多数 API 限流
#   fixed_window    — 分布式固定窗口：资源消耗最低，窗口边界处可能短暂允许 2x 请求
#   token_bucket    — 分布式令牌桶：支持突发（配合 burst），适合对外 API 平滑发送等场景
#   local           — 单机内存滑动窗口：无需 Redis，适合单实例或测试环境
# ============================================================
# limiter:
#   # 默认限流器：100 req/s，推荐首选算法
#   default:
#     algo: sliding_window
#     rate: 100
#     window: 1s
#     # Redis 实例名（对应 dao.redis 中的 key），默认 "default"
#     redis: default
#     # key_prefix: "climiter:"  # Redis key 前缀，默认 "climiter:"
#
#   # 严格限流器：10 req/min，令牌桶，允许突发 5
#   strict:
#     algo: token_bucket
#     rate: 10
#     window: 1m
#     burst: 5
#     redis: default
#
#   # 固定窗口限流器：1000 req/h
#   hourly:
#     algo: fixed_window
#     rate: 1000
#     window: 1h
#     redis: default
#
#   # 单机内存限流器，不依赖 Redis
#   local:
#     algo: local
#     rate: 50
#     window: 1s

# ============================================================
# 业务扩展配置（Config[T] 的 App 字段）
# 使用 config.Load[YourAppConfig](ctx) 时，yaml 中 app 块映射到 T。
# 不需要扩展时整段可删除。
# ============================================================
# app:
#   some_key: some_value
